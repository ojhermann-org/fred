name: Update flake.lock

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      # Mint a short-lived GitHub App token so the PR is opened by the bot
      # identity rather than github-actions[bot]. This is required because
      # workflows triggered by GITHUB_TOKEN do not trigger downstream
      # workflows — CI would never run on the PR, blocking auto-merge.
      - uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
      - uses: DeterminateSystems/nix-installer-action@v16
      - name: Update flake.lock
        run: nix flake update
      - name: Open PR and enable auto-merge if flake.lock changed
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: |
          if git diff --exit-code flake.lock; then
            echo "flake.lock unchanged, nothing to do"
          else
            BOT_USER_ID=$(gh api "/users/${APP_SLUG}[bot]" --jq .id)
            git config user.name "${APP_SLUG}[bot]"
            git config user.email "${BOT_USER_ID}+${APP_SLUG}[bot]@users.noreply.github.com"
            git checkout -b update-flake-lock-$(date +%Y%m%d)

            CURRENT=$(python3 -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")
            MAJOR=$(echo "$CURRENT" | cut -d. -f1)
            MINOR=$(echo "$CURRENT" | cut -d. -f2)
            PATCH=$(echo "$CURRENT" | cut -d. -f3)
            NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
            sed -i "s/^version = \"$CURRENT\"/version = \"$NEW_VERSION\"/" pyproject.toml

            git add flake.lock pyproject.toml
            git commit -m "chore: update flake.lock; bump to $NEW_VERSION"
            git push -u origin HEAD --force
            PR_URL=$(gh pr create \
              --title "chore: update flake.lock; bump to $NEW_VERSION" \
              --body "Automated daily flake.lock update with patch version bump. Auto-merges once CI passes.")
            gh pr merge "$PR_URL" --auto --squash --delete-branch
          fi
