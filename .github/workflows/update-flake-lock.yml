name: Update flake.lock

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      statuses: write
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - name: Update flake.lock
        run: nix flake update
      - name: Open PR if flake.lock changed
        run: |
          if git diff --exit-code flake.lock; then
            echo "flake.lock unchanged, nothing to do"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout -b update-flake-lock-$(date +%Y%m%d)

            CURRENT=$(python3 -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")
            MAJOR=$(echo "$CURRENT" | cut -d. -f1)
            MINOR=$(echo "$CURRENT" | cut -d. -f2)
            PATCH=$(echo "$CURRENT" | cut -d. -f3)
            NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
            sed -i "s/^version = \"$CURRENT\"/version = \"$NEW_VERSION\"/" pyproject.toml

            git add flake.lock pyproject.toml
            git commit -m "chore: update flake.lock; bump to $NEW_VERSION"
            git push -u origin HEAD --force
            gh pr create \
              --title "chore: update flake.lock; bump to $NEW_VERSION" \
              --body "Automated daily flake.lock update with patch version bump."
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
