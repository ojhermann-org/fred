name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [update-flake-lock-*]

jobs:
  prek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - name: Run prek
        run: nix develop --command bash -c "uv sync && source .venv/bin/activate && prek run --all-files"

  integration_tests:
    needs: [prek]
    runs-on: ubuntu-latest
    environment: integration
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - name: Fetch FRED API key
        run: |
          echo "FRED_API_KEY=$(aws secretsmanager get-secret-value --secret-id fred/api-key --query SecretString --output text)" >> $GITHUB_ENV
      - name: Run integration tests
        run: uv run pytest -m integration_test

  ci:
    needs: [prek, integration_tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi
