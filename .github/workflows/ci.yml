name: CI

on:
  pull_request:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      nix: ${{ steps.filter.outputs.nix }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            nix:
              - '**/*.nix'
              - 'flake.lock'

  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-tags: true
      - name: Verify version is not already tagged
        run: |
          VERSION=$(python3 -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")
          TAG="v${VERSION}"
          if git tag --list | grep -qx "${TAG}"; then
            echo "ERROR: tag ${TAG} already exists — this PR must include a version bump" >&2
            exit 1
          fi
          echo "Version ${TAG} is new — OK"

  python-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: ruff check
        run: uv run ruff check
      - name: ruff format
        run: uv run ruff format --check
      - name: ty check
        run: uv run ty check
      - name: pytest unit and contract tests
        run: uv run pytest -m "unit_test or contract_test"

  nix-checks:
    needs: [changes]
    if: needs.changes.outputs.nix == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - name: Run Nix and prek checks
        run: nix develop --command bash -c "uv sync && source .venv/bin/activate && prek run --all-files"

  integration_tests:
    needs: [python-checks]
    runs-on: ubuntu-latest
    environment: integration
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1
      - name: Fetch FRED API key
        run: |
          echo "FRED_API_KEY=$(aws secretsmanager get-secret-value --secret-id fred/api-key --query SecretString --output text)" >> $GITHUB_ENV
      - name: Run integration tests
        run: uv run pytest -m integration_test

  ci:
    needs: [version-check, python-checks, nix-checks, integration_tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi
