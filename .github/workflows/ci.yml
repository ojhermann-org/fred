name: CI

on:
  pull_request:

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify version is not already tagged
        run: |
          VERSION=$(python3 -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              print(tomllib.load(f)['project']['version'])
          ")
          TAG="v${VERSION}"
          # Query the remote directly. `git tag --list` against the local
          # checkout (even with fetch-tags) is unreliable on shallow clones
          # and silently returns no matches, falsely passing the check.
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "ERROR: tag ${TAG} already exists — this PR must include a version bump" >&2
            exit 1
          fi
          echo "Version ${TAG} is new — OK"

  changes:
    runs-on: ubuntu-latest
    outputs:
      nix: ${{ steps.filter.outputs.nix }}
      python: ${{ steps.filter.outputs.python }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            nix:
              - '**/*.nix'
              - 'flake.lock'
            python:
              - '**/*.py'
              - 'pyproject.toml'
              - 'uv.lock'

  nix-checks:
    needs: [version-check, changes]
    if: needs.changes.outputs.nix == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v16
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - name: Run Nix and prek checks
        run: nix develop --command bash -c "uv sync && source .venv/bin/activate && prek run --all-files"

  python-checks:
    needs: [version-check, changes]
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: ruff check
        run: uv run ruff check
      - name: ruff format
        run: uv run ruff format --check
      - name: ty check
        run: uv run ty check
      - name: pytest unit and contract tests
        run: uv run pytest -m "unit_test or contract_test"

  integration-tests:
    needs: [python-checks]
    runs-on: ubuntu-latest
    environment: integration
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Run integration tests
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: uv run pytest -m integration_test

  ci:
    needs: [version-check, nix-checks, python-checks, integration-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" || "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            exit 1
          fi
