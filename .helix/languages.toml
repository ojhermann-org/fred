[[language]]
name = "python"
language-servers = ["pylsp", "jedi"]
formatter = { command = ".venv/bin/ruff", args = ["format", "--stdin-filename", "%{filename}", "-"] }
auto-format = true

[language-server.pylsp]
command = ".venv/bin/pylsp"

[language-server.jedi]
command = ".venv/bin/jedi-language-server"
